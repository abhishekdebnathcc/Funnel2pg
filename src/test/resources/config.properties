
# ═══════════════════════════════════════════════════════════════════════════════
# FUNNEL2PG TEST CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────────
# APPLICATION URLs
# Override: -Dbase.url=https://your-url.com/
# ───────────────────────────────────────────────────────────────────────────────
base.url=https://stagingabhishek.gupigayen.com/2pgCCF25Feb/
landing.url=https://stagingabhishek.gupigayen.com/2pgCCF25Feb/landing
checkout.url=https://stagingabhishek.gupigayen.com/2pgCCF25Feb/checkout

# ───────────────────────────────────────────────────────────────────────────────
# BROWSER
# ───────────────────────────────────────────────────────────────────────────────
browser=chromium
headless=false
slow.mo=0

# ───────────────────────────────────────────────────────────────────────────────
# TIMEOUTS
# ───────────────────────────────────────────────────────────────────────────────
timeout=15000

# ───────────────────────────────────────────────────────────────────────────────
# REPORTING & SCREENSHOTS
# ───────────────────────────────────────────────────────────────────────────────
screenshot.on.failure=true
reports.dir=reports

# ───────────────────────────────────────────────────────────────────────────────
# TEST DATA
# ───────────────────────────────────────────────────────────────────────────────
randomize.data=false

# ───────────────────────────────────────────────────────────────────────────────
# PAYMENT METHOD
# Values: creditcard | cod (Cash on Delivery)
# Override via command line: -Dpayment.method=cod
# ───────────────────────────────────────────────────────────────────────────────
payment.method=creditcard

# ═══════════════════════════════════════════════════════════════════════════════
# USAGE EXAMPLES
# ═══════════════════════════════════════════════════════════════════════════════
# Run happy path:
#   mvn test -Dcucumber.filter.tags="@happy-path"
#
# Run with Cash on Delivery:
#   mvn test -Dcucumber.filter.tags="@happy-path" -Dpayment.method=cod
#
# Run headless (CI/CD):
#   mvn test -Dheadless=true
# ═══════════════════════════════════════════════════════════════════════════════
