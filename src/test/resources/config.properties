# =============================================================================
# FUNNEL2PG TEST CONFIGURATION
# =============================================================================
# Override any value via command line: -D<key>=<value>
# so the next run uses the new value without needing the -D flag.
#
# Examples:
#   First run with new URL:   mvn test -Dbase.url=https://staging.example.com/newFunnel/
#   Subsequent runs:          mvn test   (uses saved URL)
#
#   Override payment method:  mvn test -Dpayment.method=cod
# =============================================================================

# -----------------------------------------------------------------------------
# APPLICATION URL
# Landing and checkout URLs are derived automatically:
#   landing  = base.url + "landing"
#   checkout = base.url + "checkout"
# base.url MUST end with /
# -----------------------------------------------------------------------------
base.url=https://stagingkundu.gupigayen.com/12/02/2026/landing

# -----------------------------------------------------------------------------
# EMAIL OVERRIDE (optional)
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# BROWSER
# -----------------------------------------------------------------------------
browser=chromium
headless=false
slow.mo=0

# -----------------------------------------------------------------------------
# TIMEOUTS
# -----------------------------------------------------------------------------
timeout=15000

# -----------------------------------------------------------------------------
# REPORTING & SCREENSHOTS
# -----------------------------------------------------------------------------
screenshot.on.failure=true
reports.dir=reports

# -----------------------------------------------------------------------------
# PAYMENT METHOD
# Values: creditcard | cod
# -----------------------------------------------------------------------------
payment.method=creditcard

# Select all available products (true) or just the first (false)
# Override via: -Dselect.all.products=true
select.all.products=false
