# ═══════════════════════════════════════════════════════════════════════════════
# FUNNEL1PG TEST CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────────
# APPLICATION URL (Can be changed per requirement/environment)
# ───────────────────────────────────────────────────────────────────────────────
# This URL will be used for all test scenarios
# Can be overridden via command line: -Dbase.url=https://your-url.com
base.url=https://stagingabhishek.gupigayen.com/1pgCC24Feb/

# Alternative URLs (uncomment to use)
# base.url=https://production.gupigayen.com/1pgCC23Feb/
# base.url=https://staging2.gupigayen.com/1pgCC23Feb/
# base.url=http://localhost:3000/funnel/

# ───────────────────────────────────────────────────────────────────────────────
# BROWSER CONFIGURATION
# ───────────────────────────────────────────────────────────────────────────────
# Browser type: chromium, firefox, webkit
browser=chromium

# Run in headless mode (true/false)
# Set to true for CI/CD environments, false for local debugging
headless=false

# Slow motion delay (ms) - useful for debugging
# Set to 500 to see each action slowly, 0 for normal speed
slow.mo=0

# ───────────────────────────────────────────────────────────────────────────────
# TIMEOUT & WAIT CONFIGURATION
# ───────────────────────────────────────────────────────────────────────────────
# Default timeout for all page operations (milliseconds)
timeout=10000

# ───────────────────────────────────────────────────────────────────────────────
# REPORTING & SCREENSHOTS
# ───────────────────────────────────────────────────────────────────────────────
# Capture screenshot on test failure (true/false)
screenshot.on.failure=true

# Test Data Randomization
# Randomize test data: names, addresses, phone numbers (true/false)
randomize.data=false

# Report output directory
reports.dir=reports

# ═══════════════════════════════════════════════════════════════════════════════
# USAGE EXAMPLES
# ═══════════════════════════════════════════════════════════════════════════════
# 1. Run with default URL (as specified in base.url above):
#    mvn clean test
#
# 2. Run with specific URL via command line:
#    mvn clean test -Dbase.url=https://production.gupigayen.com/1pgCC23Feb/
#
# 3. Run with different environment:
#    mvn clean test -Dbase.url=https://staging2.gupigayen.com/1pgCC23Feb/
#
# 4. Run headless mode (for CI/CD):
#    mvn clean test -Dheadless=true
#
# 5. Run with slow motion for debugging:
#    mvn clean test -Dslow.mo=500
#
# 6. Run with specific tag and custom URL:
#    mvn clean test -Dcucumber.filter.tags="@happy-path" -Dbase.url=https://staging.gupigayen.com/
# ═══════════════════════════════════════════════════════════════════════════════